id: demo_pm_en
description: >
  Demo eval case for the bundled English PM posting (DemoPlatform Inc.).
  Verifies the translator activates correctly for an English posting,
  produces 04_final_en.md, and preserves the persona's employer names
  (MediaCorp, HealthApp, GastroSaaS, DirectorySaaS) as proper-name
  anchors (no German company-name translation). Targets a run produced by:

    uv run cv-tailor run stellenanzeigen/demo/posting_en.md

  after init_persona.py has rendered the demo persona.
run_glob: "*_demoplatform_*"
artifacts:
  final_cv: "04_final_en.md"
  diff: "05_diff.md"
checks:
  required_final_contains:
    - "Alex Müller"
    - "MediaCorp"
    - "HealthApp"
    - "GastroSaaS"
    - "DirectorySaaS"
    - "Product Owner"
    - "Senior Product"
  forbidden_final_contains:
    - "Alex"
    - "Müller"
    - "MediaCorp"
    - "HealthApp"
    - "GastroSaaS"
    - "Berufserfahrung"
    - "Schlüsselkompetenzen"
    - "Senior Produkt Manager in Cloud-basierten B2B Plattformen"
  required_diff_contains: []
  max_summary_words: 180
  max_diff_rows: 30
judge:
  min_score: 4
  min_factfulness: 4
  max_critical_issues: 0
  rubric: >
    Demo case for a Senior PM role at DemoPlatform Inc. (media-platform
    SaaS, AI-powered editorial workflows). The English CV must preserve
    the persona's 14-year seniority anchor and concrete employer names
    without translating them (MediaCorp stays MediaCorp, not
    "MediaCorporation"). Reject German section headings leaking into
    the English output (no "Berufserfahrung", no "Schlüsselkompetenzen").
    Reject generic PM language and any reference to non-persona
    employers. The AI-in-product-practice framing should be present
    given the posting's media + AI focus. Missing nice-to-have criteria
    (publishing-domain certifications) are improvement notes, not
    blockers.
