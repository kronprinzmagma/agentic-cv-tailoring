<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <!--
    ============================================================
    Demo HTML CV template for the public showcase repository.

    This template is intentionally minimal:
      - No photo slot
      - No proprietary fonts (uses system stack)
      - No personal branding or colour scheme
      - Page-break behaviour: sections may break across pages,
        but individual job entries and education rows stay together

    Replace this file with your own template to match your brand.
    The real templates used in private cv-tailor instances are NOT
    included in this public repo for privacy reasons.

    Playwright (headless Chromium) renders this file at A4 size.
    The PDF renderer injects the converted Markdown body either
    into <div id="cv-content"> directly or by substituting the
    CV_CONTENT comment placeholder below.
    ============================================================
  -->
  <title>CV</title>
  <style>
    /* A4 page setup */
    @page {
      size: A4;
      margin: 18mm 18mm 18mm 18mm;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Oxygen, Ubuntu, Cantarell, "Helvetica Neue", Arial,
                   sans-serif;
      font-size: 10.5pt;
      line-height: 1.45;
      color: #222;
      background: #fff;
    }

    body {
      padding: 0;
    }

    #cv-content {
      max-width: 100%;
    }

    h1 {
      font-size: 22pt;
      font-weight: 700;
      margin: 0 0 4pt 0;
      color: #111;
      letter-spacing: -0.2pt;
    }

    h2 {
      font-size: 13pt;
      font-weight: 600;
      margin: 14pt 0 6pt 0;
      padding-bottom: 3pt;
      border-bottom: 1pt solid #888;
      color: #111;
      page-break-after: avoid;
      break-after: avoid;
    }

    h3 {
      font-size: 11pt;
      font-weight: 600;
      margin: 9pt 0 3pt 0;
      color: #222;
      page-break-after: avoid;
      break-after: avoid;
    }

    p {
      margin: 0 0 6pt 0;
    }

    ul {
      margin: 3pt 0 6pt 0;
      padding-left: 18pt;
    }

    li {
      margin: 0 0 2pt 0;
    }

    strong, b {
      font-weight: 600;
    }

    hr {
      border: 0;
      border-top: 0.5pt solid #ccc;
      margin: 8pt 0;
    }

    /* Keep each job entry together on one page */
    .experience-entry,
    .education-entry {
      page-break-inside: avoid;
      break-inside: avoid;
    }

    /* Header block (name + contact metadata) */
    .cv-header {
      margin-bottom: 8pt;
    }

    .cv-contact {
      font-size: 9.5pt;
      color: #555;
      margin: 4pt 0 10pt 0;
    }

    .cv-contact p {
      margin: 1pt 0;
    }

    /* Section: no awkward orphan headings at page bottom */
    section {
      page-break-inside: auto;
    }
  </style>
</head>
<body>
  <!-- CV_HEADER -->
  <div id="cv-content">
    <!-- CV_CONTENT -->
  </div>
</body>
</html>
