  summary_de: |
    Digital Product Professional mit 14 Jahren Erfahrung in der Entwicklung und Skalierung digitaler B2B-SaaS-Produkte – von der Gründung und dem erfolgreichen Exit eines eigenen Startups bis zur strategischen Plattformverantwortung in regulierten Sektoren wie Gesundheit und Medien.

    Meine Stärke liegt in der Brückenfunktion: Ich übersetze zwischen Domänenexpert:innen – Restaurantbetreiber:innen, Praxisassistent:innen im Gesundheitssektor, Redaktionsteams in Medienorganisationen – und Engineering. Ich schaffe Klarheit wo andere Komplexität sehen, setze klare Prioritäten, führe interdisziplinäre Teams und halte konsequent auf Nutzerbedürfnisse und Geschäftsziele aus. Produktentscheidungen verankere ich in strukturierter Nutzerforschung und messbaren Ergebnissen.

    KI ist für mich gelebte Praxis: Ich habe KI-Arbeitsgruppen aufgebaut, externe Anbieter systematisch evaluiert, konkrete Anwendungsfälle pilotiert und KI-gestützte Workflows in den Produktalltag integriert. Datenbasierte Entscheidungen, klare OKR-Strukturen und ein enger Draht zum Engineering sind mein Arbeitsmodus – ob in einem regulierten Umfeld, in einem wachsenden Startup oder bei der Skalierung einer etablierten Plattform.

  summary_en: |
    Digital Product Professional with 14 years of experience developing and scaling B2B-SaaS products – from founding and successfully exiting my own start-up to strategic platform ownership in regulated sectors including healthcare and media.

    My strength is the bridging function: I translate between domain experts – restaurant operators, healthcare practice assistants, editorial teams in media organisations – and engineering. I create clarity where others see complexity, set clear priorities, lead cross-functional teams and consistently align on user needs and business outcomes. I anchor product decisions in structured user research and measurable results.

    AI is my lived practice: I have built AI working groups, systematically evaluated external providers, piloted concrete use cases and integrated AI-driven workflows into everyday product work. Data-driven decisions, clear OKR structures and close collaboration with engineering are my working mode – whether in a regulated environment, a growing start-up or a scaling established platform.

