testimonials:
  - filename: "01_mediacorp_testimonial.md"
    employer: "MediaCorp"
    period: "2023–2025"
    issuer_de: "Dr. Maria Beispiel, CTO MediaCorp"
    issuer_en: "Dr. Maria Beispiel, CTO MediaCorp"
    body_de: |
      Herr Müller war bei uns als Senior Product Owner für unsere redaktionelle Workflow-Plattform tätig und hat in dieser Zeit massgebliche Beiträge zur strategischen Weiterentwicklung des Produkts geleistet.

      Besonders beeindruckt hat uns Herr Müllers Fähigkeit, zwischen technischen Teams und redaktionellen Fachteams zu vermitteln. Er hat unsere Journalistinnen und Redakteure nicht als abstrakte Nutzer betrachtet, sondern ihre konkreten Arbeitsabläufe und Bedürfnisse durch strukturierte Discovery-Prozesse tiefgehend verstanden. Diese Brückenkompetenz hat dazu beigetragen, dass Produktentscheidungen breite interne Akzeptanz fanden.

      Herr Müller hat ausserdem die Initiative ergriffen, eine interne KI-Arbeitsgruppe aufzubauen und zu leiten. Er hat externe Anbieter systematisch evaluiert, mehrere Pilotprojekte für KI-gestützte Content-Empfehlungen konzipiert und koordiniert sowie erste Erkenntnisse direkt in den Produktentwicklungsprozess eingespeist. Sein pragmatischer Ansatz – Mehrwert demonstrieren, bevor breit ausgerollt wird – hat intern Vertrauen geschaffen.

      Als Führungspersönlichkeit hat Herr Müller unser interdisziplinäres Team aus Entwicklung, Design und Data Engineering mit Klarheit, Respekt und konsequenter Zielorientierung geführt. Er kommuniziert auf allen Ebenen des Unternehmens wirkungsvoll und verliert dabei nie den Fokus auf das Wesentliche.

      Wir empfehlen Herrn Müller ohne Einschränkung und wünschen ihm für seinen weiteren beruflichen Weg alles Gute.
    body_en: |
      Alex Müller worked with us as Senior Product Owner for our editorial workflow platform, and during this period made decisive contributions to the strategic development of the product.

      We were particularly impressed by Alex's ability to bridge between technical teams and editorial specialist teams. Rather than treating our journalists and editors as abstract users, he developed a deep understanding of their concrete workflows and needs through structured discovery processes. This bridging capability meant that product decisions consistently gained broad internal acceptance.

      Alex also took the initiative to build and lead an internal AI working group. He systematically evaluated external providers, designed and coordinated several pilot projects for AI-assisted content recommendations, and fed early findings directly into the product development process. His pragmatic approach – demonstrating value before broad rollout – built trust across the organisation.

      As a leader, Alex guided our cross-functional team of engineering, design and data engineering with clarity, respect and consistent goal-orientation. He communicates effectively at all levels of the company without losing focus on what matters most.

      We recommend Alex without reservation and wish him all the best for the next chapter of his career.

  - filename: "02_healthapp_testimonial.md"
    employer: "HealthApp"
    period: "2019–2023"
    issuer_de: "Thomas Musterling, VP Product HealthApp"
    issuer_en: "Thomas Musterling, VP Product HealthApp"
    body_de: |
      Herr Müller hat bei HealthApp über vier Jahre lang als Product Owner für unsere Kernplattform gewirkt, die täglich von mehreren tausend Praxisassistent:innen in ambulanten Gesundheitseinrichtungen genutzt wird. In diesem regulierten und sicherheitskritischen Umfeld hat er aussergewöhnliche Qualitäten bewiesen.

      Was Herrn Müller auszeichnet, ist sein tiefes Verständnis für die tatsächlichen Arbeitsrealitäten unserer Nutzerinnen und Nutzer. Er hat regelmässig Praxisbesuche durchgeführt, strukturierte Interviews geführt und dieses Wissen konsequent in präzise Anforderungen übersetzt. Gerade im Gesundheitssektor, wo Fehler direkte Auswirkungen auf die Patientenversorgung haben können, war diese Qualität von zentraler Bedeutung.

      Herr Müller hat massgeblich zur Verbesserung unserer Release-Stabilität beigetragen. Er hat technische Risiken frühzeitig identifiziert, in Zusammenarbeit mit dem Engineering-Team priorisiert und dafür gesorgt, dass regulatorische Anforderungen stets eingehalten wurden. Die Anzahl kritischer Produktionsfehler ist während seiner Amtszeit kontinuierlich gesunken.

      Darüber hinaus hat Herr Müller wichtige Impulse für die strategische Weiterentwicklung unserer Plattformarchitektur gegeben. Seine Fähigkeit, technische Abwägungen zu verstehen und in strategische Produktentscheidungen zu übersetzen, hat unserem Engineering-Team wertvolle Orientierung gegeben.

      Wir haben Herrn Müller als verlässlichen, kompetenten und menschlich integren Partner geschätzt. Wir empfehlen ihn wärmstens.
    body_en: |
      Alex Müller worked at HealthApp for over four years as Product Owner for our core platform, which is used daily by several thousand practice assistants in outpatient healthcare settings. In this regulated, safety-critical environment, he demonstrated exceptional qualities.

      What distinguishes Alex is his deep understanding of the actual working realities of our users. He regularly conducted practice visits, led structured interviews and consistently translated this knowledge into precise requirements. In the healthcare sector, where errors can have direct consequences for patient care, this quality was of central importance.

      Alex contributed decisively to improving our release stability. He identified technical risks early, prioritised them in collaboration with the engineering team and ensured that regulatory requirements were consistently met. The number of critical production defects decreased continuously during his tenure.

      Alex also provided important input for the strategic development of our platform architecture. His ability to understand technical trade-offs and translate them into strategic product decisions gave our engineering team valuable orientation.

      We valued Alex as a reliable, competent and personally principled partner. We recommend him warmly.

  - filename: "03_gastrosaas_testimonial.md"
    employer: "GastroSaaS"
    period: "2015–2019"
    issuer_de: "Sandra Demo, Board Chair GastroSaaS"
    issuer_en: "Sandra Demo, Board Chair GastroSaaS"
    body_de: |
      Herr Müller hat GastroSaaS gegründet und als Managing Director von der ersten Idee bis zum erfolgreichen Exit aufgebaut. In dieser Zeit war er nicht nur operativer und strategischer Kopf des Unternehmens, sondern auch der treibende Produktdenker hinter unserer Plattform.

      Sein tiefstes Merkmal als Gründer war die Fähigkeit, direkt mit Restaurantbetreibern zu sprechen, ihre Herausforderungen im Alltag zu verstehen und diese Erkenntnisse sofort in Produktentscheidungen zu überführen. Er hat nie den Fehler gemacht, die eigene Meinung über das Nutzerfeedback zu stellen. Dieses Grundprinzip hat GastroSaaS von Anfang an auf einem soliden Nutzerbedürfnis aufgebaut.

      Herr Müller hat ausserdem bewiesen, dass er ein Unternehmen aufbauen kann. Er hat unser Team strukturiert rekrutiert, eine Verkaufs- und Marketingstrategie entwickelt, strategische Partnerschaften verhandelt und das Unternehmen gleichzeitig durch mehrere Pivots navigiert, ohne das Team oder die Investoren zu verlieren.

      Der Exit war das Ergebnis jahrelanger konsequenter Arbeit. Herr Müller hat die Übernahme professionell gestaltet, das Team dabei gut begleitet und dafür gesorgt, dass die Integration in die übernehmende Plattform reibungslos verlaufen ist.

      Ich empfehle Alex Müller als Unternehmer, Produktdenker und Führungsperson ohne jede Einschränkung.
    body_en: |
      Alex Müller founded GastroSaaS and built it as Managing Director from first idea through to successful exit. In this period, he was not only the operational and strategic head of the company but also the driving product mind behind our platform.

      His defining quality as a founder was the ability to speak directly with restaurant operators, understand their daily challenges and immediately translate these insights into product decisions. He never made the mistake of placing his own opinion above user feedback. This fundamental principle meant GastroSaaS was built from the start on a solid user need.

      Alex also demonstrated that he can build a company. He recruited our team systematically, developed a sales and marketing strategy, negotiated strategic partnerships and navigated the company through several pivots without losing the team or investors.

      The exit was the result of years of consistent work. Alex handled the acquisition professionally, supported the team well through the transition and ensured that integration into the acquiring platform was smooth.

      I recommend Alex Müller as an entrepreneur, product thinker and leader without reservation.

  - filename: "04_directorysaas_testimonial.md"
    employer: "DirectorySaaS"
    period: "2011–2015"
    issuer_de: "Peter Beispielsen, Head of Product DirectorySaaS"
    issuer_en: "Peter Beispielsen, Head of Product DirectorySaaS"
    body_de: |
      Herr Müller war von 2011 bis 2015 als Product Manager in unserem Team tätig und hat in dieser Zeit wesentlich zum Wachstum und zur Reife unserer Plattformorganisation beigetragen.

      Besonders hervorzuheben ist Herrn Müllers Beitrag zur Lancierung unserer Mobile-App-Strategie. Er hat ein cross-funktionales Team durch den gesamten Zyklus von der Konzeption bis zum Launch geführt, dabei alle relevanten Stakeholder – Entwicklung, Design, Marketing und Vertrieb – eingebunden und den Launch termingerecht und innerhalb des Budgets realisiert.

      Herr Müller hat uns ausserdem dabei geholfen, unsere Entscheidungsprozesse zu verbessern. Er hat Analyse-Frameworks eingeführt, die es uns erstmals ermöglichten, Produktentscheidungen konsequent auf Nutzungsdata zu stützen. Diese Grundlagen sind auch heute noch Teil unserer Produktarbeit.

      Was Herrn Müller als Produktmanager ausgezeichnet hat, war seine Fähigkeit, technische Komplexität verständlich zu machen und gleichzeitig auf Geschäftsergebnisse fokussiert zu bleiben. Er hat Entwicklungsteams verstanden und respektiert, ohne sich in technischen Debatten zu verlieren.

      Herrn Müllers weiteres Gründer-Engagement hat uns nicht überrascht. Die Qualitäten, die er als Product Manager gezeigt hat – Eigeninitiative, Nutzernähe, Führungsstärke – sind genau das, was einen erfolgreichen Unternehmer ausmacht. Wir wünschen ihm weiterhin viel Erfolg.
    body_en: |
      Alex Müller worked in our team as Product Manager from 2011 to 2015 and during this period contributed significantly to the growth and maturity of our product organisation.

      Particularly noteworthy is Alex's contribution to the launch of our mobile app strategy. He led a cross-functional team through the entire cycle from concept through to launch, engaging all relevant stakeholders – engineering, design, marketing and sales – and delivering the launch on time and within budget.

      Alex also helped us improve our decision-making processes. He introduced analytics frameworks that for the first time allowed us to base product decisions consistently on usage data. These foundations remain part of our product work to this day.

      What distinguished Alex as a product manager was his ability to make technical complexity understandable while remaining focused on business outcomes. He understood and respected engineering teams without getting lost in technical debates.

      Alex's subsequent founding activity did not surprise us. The qualities he demonstrated as a product manager – initiative, user proximity, leadership strength – are exactly what makes a successful entrepreneur. We wish him continued success.
